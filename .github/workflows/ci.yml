name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Vitest unit tests ────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── 2. Build (depends on unit tests passing) ────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-test]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://coil.5am.team
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

  # ── 3. Playwright E2E against live site ────────────────────────────────────
  #
  # Runs against https://coil.5am.team (PLAYWRIGHT_BASE_URL).
  # Auth-gated tests skip gracefully when secrets are absent.
  # Demo-mode tests (demo.spec.ts) always run — no secrets needed.
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: https://coil.5am.team
      # Optional: set these secrets in GitHub to enable auth-gated settings tests
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
