name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to coil.5am.team
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Update Supabase (force-recreate picks up any compose changes)
            cd /opt/supabase
            docker compose --env-file .env up -d --force-recreate

            # Apply any new DB migrations (idempotent)
            AUTH_PW=$(grep AUTH_ADMIN_PW .env | cut -d= -f2)
            docker exec supabase-db-1 psql -U postgres -d postgres -v auth_pw="$AUTH_PW" << 'SQLEOF'
            DO $$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_policies WHERE tablename='weeks' AND policyname='users see own weeks') THEN
                CREATE POLICY "users see own weeks" ON public.weeks FOR ALL USING ((select auth.uid()) = user_id);
              END IF;
              IF NOT EXISTS (SELECT FROM pg_policies WHERE tablename='settings' AND policyname='users manage own settings') THEN
                CREATE POLICY "users manage own settings" ON public.settings FOR ALL USING ((select auth.uid()) = user_id);
              END IF;
              -- email_pdf column (added 2026-03-01)
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='email_pdf') THEN
                ALTER TABLE public.settings ADD COLUMN email_pdf boolean DEFAULT false;
              END IF;
            END $$;
            GRANT ALL ON public.weeks TO authenticated;
            GRANT ALL ON public.settings TO authenticated;
            SQLEOF

            # Update Next.js app
            cd /opt/coil
            git fetch origin
            git reset --hard origin/main
            eval $(grep -E '^NEXT_PUBLIC_' .env.local | sed 's/^/export /')
            docker build -t coil-app \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
              --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
              --build-arg NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
              .
            docker stop coil || true
            docker rm coil || true
            docker run -d \
              --name coil \
              --restart unless-stopped \
              -p 127.0.0.1:3000:3000 \
              --env-file .env.local \
              coil-app
            echo "Deploy complete: $(date -u)"

