name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  migrate:
    name: DB migrations
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Write env files and run migrations via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SUPABASE_JWT_SECRET,SUPABASE_POSTGRES_PASSWORD,SUPABASE_POSTGRES_DB,SUPABASE_POSTGRES_USER,SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY,SUPABASE_AUTH_ADMIN_PW,SUPABASE_SITE_URL,SUPABASE_API_EXTERNAL_URL,SUPABASE_SMTP_HOST,SUPABASE_SMTP_PORT,SUPABASE_SMTP_USER,SUPABASE_SMTP_PASS,SUPABASE_SMTP_SENDER_NAME,SUPABASE_SMTP_ADMIN_EMAIL,SUPABASE_MAILER_URLPATHS_CONFIRMATION,SUPABASE_GOTRUE_EXTERNAL_GOOGLE_ENABLED,SUPABASE_GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID,SUPABASE_GOTRUE_EXTERNAL_GOOGLE_SECRET,SUPABASE_GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI
          script: |
            set -e

            # Write /opt/supabase/.env from GitHub Actions secrets
            cat > /opt/supabase/.env << ENVEOF
            JWT_SECRET=${SUPABASE_JWT_SECRET}
            POSTGRES_PASSWORD=${SUPABASE_POSTGRES_PASSWORD}
            POSTGRES_DB=${SUPABASE_POSTGRES_DB}
            POSTGRES_USER=${SUPABASE_POSTGRES_USER}
            ANON_KEY=${SUPABASE_ANON_KEY}
            SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            AUTH_ADMIN_PW=${SUPABASE_AUTH_ADMIN_PW}
            SITE_URL=${SUPABASE_SITE_URL}
            API_EXTERNAL_URL=${SUPABASE_API_EXTERNAL_URL}
            SMTP_HOST=${SUPABASE_SMTP_HOST}
            SMTP_PORT=${SUPABASE_SMTP_PORT}
            SMTP_USER=${SUPABASE_SMTP_USER}
            SMTP_PASS=${SUPABASE_SMTP_PASS}
            SMTP_SENDER_NAME=${SUPABASE_SMTP_SENDER_NAME}
            SMTP_ADMIN_EMAIL=${SUPABASE_SMTP_ADMIN_EMAIL}
            MAILER_URLPATHS_CONFIRMATION=${SUPABASE_MAILER_URLPATHS_CONFIRMATION}
            GOTRUE_EXTERNAL_GOOGLE_ENABLED=${SUPABASE_GOTRUE_EXTERNAL_GOOGLE_ENABLED}
            GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID=${SUPABASE_GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID}
            GOTRUE_EXTERNAL_GOOGLE_SECRET=${SUPABASE_GOTRUE_EXTERNAL_GOOGLE_SECRET}
            GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI=${SUPABASE_GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI}
            ENVEOF

            # Update Supabase (start any stopped containers; no force-recreate to avoid DB churn)
            cd /opt/supabase
            docker compose --env-file .env up -d

            # Fix PLACEHOLDER_AUTH_PW on fresh DB init (idempotent)
            docker exec supabase-db-1 psql -U postgres -d postgres -c \
              "ALTER ROLE supabase_auth_admin WITH PASSWORD '${SUPABASE_AUTH_ADMIN_PW}';" || true
            docker exec supabase-db-1 psql -U postgres -d postgres -c \
              "ALTER ROLE authenticator WITH PASSWORD '${SUPABASE_AUTH_ADMIN_PW}';" || true

            # Apply DB migrations (idempotent)
            cat > /tmp/migrate.sql << 'EOF'
            DO $body$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_policies WHERE tablename='weeks' AND policyname='users see own weeks') THEN
                CREATE POLICY "users see own weeks" ON public.weeks FOR ALL USING ((select auth.uid()) = user_id);
              END IF;
              IF NOT EXISTS (SELECT FROM pg_policies WHERE tablename='settings' AND policyname='users manage own settings') THEN
                CREATE POLICY "users manage own settings" ON public.settings FOR ALL USING ((select auth.uid()) = user_id);
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='weekly_email_day') THEN
                ALTER TABLE public.settings ADD COLUMN weekly_email_day text DEFAULT 'sunday';
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='report_email') THEN
                ALTER TABLE public.settings ADD COLUMN report_email text;
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='email_pdf') THEN
                ALTER TABLE public.settings ADD COLUMN email_pdf boolean DEFAULT true;
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='reminder1_enabled') THEN
                ALTER TABLE public.settings ADD COLUMN reminder1_enabled boolean DEFAULT true;
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='reminder1_hour') THEN
                ALTER TABLE public.settings ADD COLUMN reminder1_hour integer DEFAULT 8;
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='reminder2_enabled') THEN
                ALTER TABLE public.settings ADD COLUMN reminder2_enabled boolean DEFAULT false;
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='reminder2_hour') THEN
                ALTER TABLE public.settings ADD COLUMN reminder2_hour integer DEFAULT 20;
              END IF;
              IF NOT EXISTS (SELECT FROM information_schema.columns WHERE table_name='settings' AND column_name='week_start') THEN
                ALTER TABLE public.settings ADD COLUMN week_start text DEFAULT 'monday';
              END IF;
            END $body$;
            GRANT ALL ON public.weeks TO authenticated;
            GRANT ALL ON public.settings TO authenticated;
            SELECT pg_notify('pgrst', 'reload schema');
            EOF
            docker cp /tmp/migrate.sql supabase-db-1:/tmp/migrate.sql
            docker exec supabase-db-1 psql -U postgres -d postgres -f /tmp/migrate.sql -v ON_ERROR_STOP=1
            echo "Migrations complete: $(date -u)"

  deploy-app:
    name: Deploy app
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Write env file, build and deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: COIL_APP_NEXT_PUBLIC_SUPABASE_URL,COIL_APP_NEXT_PUBLIC_SUPABASE_ANON_KEY,COIL_APP_NEXT_PUBLIC_SITE_URL,COIL_APP_NEXT_PUBLIC_APP_URL,COIL_APP_SUPABASE_SERVICE_ROLE_KEY,COIL_APP_RESEND_API_KEY,COIL_APP_CRON_SECRET
          script: |
            set -e

            # Write /opt/coil/.env.local from GitHub Actions secrets
            cat > /opt/coil/.env.local << ENVEOF
            NEXT_PUBLIC_SUPABASE_URL=${COIL_APP_NEXT_PUBLIC_SUPABASE_URL}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${COIL_APP_NEXT_PUBLIC_SUPABASE_ANON_KEY}
            NEXT_PUBLIC_SITE_URL=${COIL_APP_NEXT_PUBLIC_SITE_URL}
            NEXT_PUBLIC_APP_URL=${COIL_APP_NEXT_PUBLIC_APP_URL}
            SUPABASE_SERVICE_ROLE_KEY=${COIL_APP_SUPABASE_SERVICE_ROLE_KEY}
            RESEND_API_KEY=${COIL_APP_RESEND_API_KEY}
            CRON_SECRET=${COIL_APP_CRON_SECRET}
            ENVEOF

            cd /opt/coil
            git fetch origin
            git reset --hard origin/main

            docker build -t coil-app \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="${COIL_APP_NEXT_PUBLIC_SUPABASE_URL}" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${COIL_APP_NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
              --build-arg NEXT_PUBLIC_SITE_URL="${COIL_APP_NEXT_PUBLIC_SITE_URL}" \
              --build-arg NEXT_PUBLIC_APP_URL="${COIL_APP_NEXT_PUBLIC_APP_URL}" \
              .

            # Blue/green deploy — app uses ports 3000 (blue) and 3002 (green)
            # Port 3001 is reserved for PostgREST/Supabase
            ACTIVE_PORT=$(grep -oP 'proxy_pass http://(?:127\.0\.0\.1|localhost):\K(3000|3002)' \
              /etc/nginx/sites-enabled/coil 2>/dev/null | head -1)
            if [ -z "$ACTIVE_PORT" ]; then ACTIVE_PORT=3000; fi
            if [ "$ACTIVE_PORT" = "3000" ]; then NEW_PORT=3002; else NEW_PORT=3000; fi
            echo "Active port: ${ACTIVE_PORT} → New port: ${NEW_PORT}"

            # Start new container on NEW_PORT
            docker stop coil-new || true
            docker rm coil-new || true
            STALE=$(docker ps -q --filter "publish=127.0.0.1:${NEW_PORT}" 2>/dev/null || true)
            if [ -n "$STALE" ]; then docker stop $STALE || true; docker rm $STALE || true; fi
            sleep 1

            docker run -d \
              --name coil-new \
              --restart unless-stopped \
              -p 127.0.0.1:${NEW_PORT}:3000 \
              --env-file /opt/coil/.env.local \
              coil-app

            # Health check — wait up to 60s (Next.js cold start can be slow)
            echo "Waiting for new container on port ${NEW_PORT}..."
            HEALTHY=0
            for i in $(seq 1 60); do
              if curl -sf --max-time 5 http://127.0.0.1:${NEW_PORT}/ > /dev/null 2>&1; then
                echo "Healthy after ${i}s"; HEALTHY=1; break
              fi
              sleep 1
            done
            if [ "$HEALTHY" != "1" ]; then
              echo "Health check failed after 60s — rolling back"
              docker logs coil-new --tail 50 2>&1 || true
              docker stop coil-new || true
              docker rm coil-new || true
              exit 1
            fi

            # Swap nginx to the new port (only touch app proxy_pass lines)
            sudo sed -i "s|proxy_pass http://127.0.0.1:${ACTIVE_PORT};|proxy_pass http://127.0.0.1:${NEW_PORT};|g" \
              /etc/nginx/sites-enabled/coil
            sudo sed -i "s|proxy_pass http://localhost:${ACTIVE_PORT};|proxy_pass http://127.0.0.1:${NEW_PORT};|g" \
              /etc/nginx/sites-enabled/coil
            sudo nginx -t && sudo nginx -s reload

            # Cut over: stop old container, promote coil-new → coil
            docker stop coil || true
            docker rm coil || true
            docker rename coil-new coil

            # Ensure cron jobs are set (idempotent)
            (crontab -l 2>/dev/null | grep -v "api/cron/"; \
              echo "0 20 * * 0 curl -s -X POST https://coil.5am.team/api/cron/weekly-email -H \"Authorization: Bearer ${COIL_APP_CRON_SECRET}\" >> /var/log/coil-cron.log 2>&1"; \
              echo "0 * * * * curl -s https://coil.5am.team/api/cron/daily-reminder -H \"Authorization: Bearer ${COIL_APP_CRON_SECRET}\" >> /var/log/coil-cron.log 2>&1" \
            ) | crontab -

            echo "Deploy complete: $(date -u)"
