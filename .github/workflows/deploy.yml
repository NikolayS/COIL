name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to coil.5am.team
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/coil
            git pull origin main
            docker build -t coil-app .
            docker stop coil || true
            docker rm coil || true
            docker run -d \
              --name coil \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file .env.local \
              coil-app
            echo "Deploy complete: $(date -u)"
