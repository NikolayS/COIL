# Nginx config for coil.5am.team
# Place at: /etc/nginx/sites-enabled/coil
# SSL managed by certbot (letsencrypt)

server {
    server_name coil.5am.team;

    # Auth callback → Next.js (before /auth/v1 catch-all)
    location = /auth/callback {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GoTrue verify (magic link lands here)
    location /verify {
        proxy_pass http://localhost:9999/verify;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GoTrue API
    location /auth/v1/ {
        proxy_pass http://localhost:9999/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PostgREST API
    location /rest/v1/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Next.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # SSL managed by certbot — do not edit below manually
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/coil.5am.team/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coil.5am.team/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = coil.5am.team) { return 301 https://$host$request_uri; }
    listen 80;
    server_name coil.5am.team;
    return 404;
}
